<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewnly — Настройка профиля</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #0f0f0f;
            --bg-card: #181818;
            --accent: #7F49B4;
            --accent-light: #9d6cd3;
            --text-gray: #CFCFCF;
            --white: #ffffff;
            --error: #ff4d4d;
            --border: rgba(127, 73, 180, 0.2);
        }

        body {
            margin: 0;
            background: var(--bg-deep);
            color: var(--text-gray);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            background: var(--bg-card);
            width: 100%;
            max-width: 480px;
            border-radius: 32px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        /* Декоративный фон сверху */
        .profile-header-bg {
            height: 100px;
            background: linear-gradient(135deg, #2a1b3d 0%, #181818 100%);
            border-bottom: 1px solid var(--border);
        }

        .content {
            padding: 0 30px 40px;
            margin-top: -50px; /* Наложение аватара на фон */
            text-align: center;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            z-index: 10;
        }

        .back-btn:hover { background: var(--accent); border-color: var(--accent); }

        /* Аватар */
        .avatar-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar-main {
            width: 100%;
            height: 100%;
            background: var(--accent);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: 800;
            border: 4px solid var(--bg-card);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            overflow: hidden;
            cursor: pointer;
        }

        .avatar-main img { width: 100%; height: 100%; object-fit: cover; }

        .edit-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--accent);
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--bg-card);
            color: white;
        }

        /* Информационные блоки */
        .user-id {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(127, 73, 180, 0.1);
            color: var(--accent);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        /* Поля ввода */
        .field-box {
            margin-bottom: 24px;
            text-align: left;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 0 5px;
        }

        label {
            color: var(--white);
            font-size: 14px;
            font-weight: 600;
        }

        .char-counter {
            font-size: 11px;
            color: var(--text-gray);
            opacity: 0.5;
        }

        .char-counter.limit { color: var(--error); opacity: 1; }

        input, textarea {
            width: 100%;
            background: #0d0d0d;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            color: var(--white);
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        textarea { resize: none; height: 100px; }

        input:focus, textarea:focus {
            border-color: var(--accent);
            background: #111;
            box-shadow: 0 0 0 4px rgba(127, 73, 180, 0.1);
        }

        /* Кнопка */
        .action-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .action-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(127, 73, 180, 0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="profile-container">
        <button class="back-btn" onclick="location.href='dash.html'"><i data-lucide="arrow-left" size="20"></i></button>
        <div class="profile-header-bg"></div>
        
        <div class="content">
            <div class="avatar-wrapper" onclick="document.getElementById('fileInput').click()">
                <div class="avatar-main" id="avatarPreview">
                    <span id="letterPlaceholder">?</span>
                </div>
                <div class="edit-badge"><i data-lucide="camera" size="16"></i></div>
            </div>
            <input type="file" id="fileInput" accept="image/*" onchange="handleImage(this)">

            <div class="user-id">USER ID: <span id="userId">000</span></div>

            <div class="field-box">
                <div class="label-row">
                    <label>Никнейм</label>
                    <span class="char-counter" id="nickCounter">0 / 50</span>
                </div>
                <input type="text" id="nickInput" maxlength="50" placeholder="Как вас называть?" oninput="updateCounter('nickInput', 'nickCounter', 50)">
            </div>

            <div class="field-box">
                <div class="label-row">
                    <label>О себе</label>
                    <span class="char-counter" id="descCounter">0 / 120</span>
                </div>
                <textarea id="descInput" maxlength="120" placeholder="Напишите что-нибудь интересное..." oninput="updateCounter('descInput', 'descCounter', 120)"></textarea>
            </div>

            <button class="action-btn" id="saveBtn" onclick="saveChanges()">Сохранить профиль</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdAUULEX-vHBxqN3SHp7d0RDNpOdGVyjnVDuFbC_g71u5iZXVBqFrJFesD-CY83Z-9/exec'; // Вставь сюда свой URL
        const oldNick = localStorage.getItem('mewnly_user');
        let avatarBase64 = null;

        // 1. Загрузка данных
        window.onload = async () => {
            if (!oldNick) window.location.href = '../index.html';
            
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getProfileFull', username: oldNick })
                });
                const data = await res.json();

                document.getElementById('userId').innerText = String(data.id).padStart(3, '0');
                document.getElementById('nickInput').value = data.username;
                document.getElementById('descInput').value = data.desc || "";
                
                // Обновляем счетчики
                updateCounter('nickInput', 'nickCounter', 50);
                updateCounter('descInput', 'descCounter', 120);

                if (data.avatar) {
                    document.getElementById('avatarPreview').innerHTML = `<img src="${data.avatar}">`;
                } else {
                    document.getElementById('letterPlaceholder').innerText = data.username[0].toUpperCase();
                }
            } catch (e) {
                console.error("Ошибка загрузки");
            }
        };

        // 2. Обновление счетчиков символов
        function updateCounter(inputId, counterId, limit) {
            const input = document.getElementById(inputId);
            const counter = document.getElementById(counterId);
            const len = input.value.length;
            counter.innerText = `${len} / ${limit}`;
            
            if (len >= limit) counter.classList.add('limit');
            else counter.classList.remove('limit');
        }

        // 3. Обработка фото
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('avatarPreview').innerHTML = `<img src="${e.target.result}">`;
                    avatarBase64 = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 4. Сохранение
        async function saveChanges() {
            const saveBtn = document.getElementById('saveBtn');
            const newNick = document.getElementById('nickInput').value.trim();
            const newDesc = document.getElementById('descInput').value.trim();

            if (newNick.length < 3) return alert("Ник слишком короткий!");

            saveBtn.disabled = true;
            saveBtn.innerText = "Синхронизация...";

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateProfile',
                        oldUsername: oldNick,
                        newUsername: newNick,
                        description: newDesc,
                        avatar: avatarBase64
                    })
                });

                const status = await response.text();
                
                if (status === "SUCCESS_UPDATE") {
                    localStorage.setItem('mewnly_user', newNick);
                    alert("Профиль обновлен успешно!");
                    location.href = 'dash.html';
                } else if (status === "NICK_TAKEN") {
                    alert("Этот ник уже занят!");
                    saveBtn.disabled = false;
                    saveBtn.innerText = "Сохранить профиль";
                }
            } catch (err) {
                alert("Ошибка сети");
                saveBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
