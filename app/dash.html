<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mewnly — Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #141414;       /* Основной черный */
            --bg-card: #1c1c1c;       /* Карточки и панели */
            --accent: #7F49B4;        /* Твой фиолетовый */
            --text-gray: #CFCFCF;     /* Твой серый текст */
            --white: #ffffff;
            --border: rgba(127, 73, 180, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--bg-deep);
            color: var(--text-gray);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Запрещаем общий скролл страницы */
        }

        /* --- LAYOUT --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* --- DRAWER (ВЫЕЗДНОЕ МЕНЮ) --- */
        .drawer {
            position: fixed;
            left: -320px;
            top: 0;
            width: 300px;
            height: 100%;
            background: #181818;
            border-right: 1px solid var(--accent);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }

        .drawer.open {
            transform: translateX(320px);
            box-shadow: 20px 0 50px rgba(0,0,0,0.8);
        }

        .mini-profile {
            padding: 50px 20px 30px;
            text-align: center;
            background: linear-gradient(180deg, #1f1629 0%, #181818 100%);
            border-bottom: 1px solid var(--border);
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 22px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(127, 73, 180, 0.3);
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        .drawer-nav {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .nav-link {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-gray);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.2s;
            font-size: 15px;
            margin-bottom: 5px;
            text-align: left;
        }

        .nav-link:hover {
            background: rgba(127, 73, 180, 0.15);
            color: var(--white);
        }

        .nav-link i { color: var(--accent); width: 20px; }

        /* --- SIDEBAR (СПИСОК ЧАТОВ) --- */
        .sidebar {
            width: 350px;
            min-width: 350px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .header-tools {
            padding: 20px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .burger-icon {
            cursor: pointer;
            color: var(--accent);
            display: flex;
            align-items: center;
            transition: 0.2s;
        }

        .search-wrapper {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }

        .search-wrapper input {
            background: none;
            border: none;
            color: white;
            padding: 10px 5px;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        .chats-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-card {
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 8px;
        }

        .chat-card:hover { background: rgba(255,255,255,0.03); }

        /* --- MAIN VIEW (ОКНО ПЕРЕПИСКИ / ПРИВЕТСТВИЕ) --- */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .welcome-hero h1 {
            font-size: 64px;
            color: var(--accent);
            margin: 0;
            letter-spacing: -3px;
            font-weight: 700;
        }

        .clock-display {
            font-size: 22px;
            margin-top: 15px;
            color: var(--text-gray);
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* --- OVERLAY --- */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1500;
        }
        .overlay.active { display: block; }

        /* --- ADAPTIVITY --- */
        @media (max-width: 850px) {
            .main-panel { display: none; }
            .sidebar { width: 100%; min-width: 100%; border-right: none; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="drawer" id="drawer">
        <div class="mini-profile">
            <div class="avatar-circle" id="m-avatar">?</div>
            <h3 id="m-username" style="margin:0; color:var(--white); font-size: 20px;">Username</h3>
            <p id="m-desc" style="font-size:13px; opacity:0.5; margin:8px 0 0 0;">Status Loading...</p>
        </div>
        
        <div class="drawer-nav">
            <button class="nav-link" onclick="location.href='profile.html'"><i data-lucide="user"></i> Профиль</button>
            <button class="nav-link" onclick="location.href='friends.html'"><i data-lucide="users"></i> Друзья</button>
            <button class="nav-link" onclick="location.href='settings.html'"><i data-lucide="settings"></i> Настройки</button>
            <button class="nav-link" onclick="location.href='updates.html'"><i data-lucide="refresh-cw"></i> Обновления</button>
            <button class="nav-link" onclick="location.href='creator.html'"><i data-lucide="code"></i> Разработчик</button>
            
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
                <button class="nav-link" onclick="logout()" style="color: #ff5555;">
                    <i data-lucide="log-out" style="color: #ff5555;"></i> Выйти
                </button>
            </div>
        </div>
    </nav>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="header-tools">
                <div class="burger-icon" onclick="toggleMenu()">
                    <i data-lucide="menu"></i>
                </div>
                <div class="search-wrapper">
                    <i data-lucide="search" size="18" style="opacity: 0.3;"></i>
                    <input type="text" id="searchInput" placeholder="Поиск в Mewnly" onkeydown="handleSearch(event)">
                </div>
            </div>

            <div class="chats-scroll" id="chatList">
                <div class="chat-card">
                    <div style="width:50px; height:50px; border-radius:12px; background: #252525; display:flex; align-items:center; justify-content:center;">
                        <i data-lucide="message-square" style="color:var(--accent)"></i>
                    </div>
                    <div style="flex:1">
                        <div style="color:var(--white); font-weight:600; font-size:15px;">Mewnly Support</div>
                        <div style="font-size:13px; opacity:0.5;">Добро пожаловать в систему!</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-panel">
            <div class="welcome-hero">
                <h1>Mewnly</h1>
            </div>
            <div class="clock-display" id="clock">00:00:00</div>
        </main>

    </div>

    <script>
        // Инициализация иконок
        lucide.createIcons();

        // Конфигурация
        const SCRIPT_URL = 'ТВОЙ_URL_GOOGLE_APPS_SCRIPT'; // <--- ОБЯЗАТЕЛЬНО ВСТАВЬ СВОЙ URL
        const currentUser = localStorage.getItem('mewnly_user');

        // Проверка авторизации
        if (!currentUser) {
            window.location.href = '../index.html';
        } else {
            document.getElementById('m-username').innerText = currentUser;
            document.getElementById('m-avatar').innerText = currentUser[0].toUpperCase();
        }

        // --- ЛОГИКА ИНТЕРФЕЙСА ---

        function toggleMenu() {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('overlay');
            drawer.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function handleSearch(e) {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) {
                    window.location.href = `search.html?query=${encodeURIComponent(query)}`;
                }
            }
        }

        function updateClock() {
            const clock = document.getElementById('clock');
            if (clock) {
                const now = new Date();
                clock.innerText = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        function logout() {
            if (confirm("Вы действительно хотите выйти?")) {
                localStorage.removeItem('mewnly_user');
                window.location.href = '../index.html';
            }
        }

        // --- ЗАГРУЗКА ДАННЫХ ПРОФИЛЯ ---

        async function loadProfile() {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getUserData', username: currentUser })
                });
                
                const data = await response.json();
                if (data.desc) document.getElementById('m-desc').innerText = data.desc;
                if (data.avatar) {
                    document.getElementById('m-avatar').innerHTML = `<img src="${data.avatar}" alt="avatar">`;
                }
            } catch (err) {
                document.getElementById('m-desc').innerText = "Безопасное соединение активно";
            }
        }

        loadProfile();
    </script>
</body>
</html>
