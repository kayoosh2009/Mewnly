<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewnly — Stealth Access</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3YsqmPng3BdsgbZXs-Ok1c5Z4e1HZhkY",
            authDomain: "mewnly.firebaseapp.com",
            projectId: "mewnly",
            storageBucket: "mewnly.firebasestorage.app",
            messagingSenderId: "854522459869",
            appId: "1:854522459869:web:edc0df5aad55ca1f4e8d34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.isUsernameTaken = async (username) => {
            const q = query(collection(db, "users"), where("username", "==", username.toLowerCase()));
            const querySnapshot = await getDocs(q);
            return !querySnapshot.empty;
        };

        window.firebaseLogin = (email, pass) => signInWithEmailAndPassword(auth, email, pass);
        window.firebaseRegister = (email, pass) => createUserWithEmailAndPassword(auth, email, pass);
        window.saveUserData = (uid, data) => setDoc(doc(db, "users", uid), data);
        window.getUserByNick = async (nick) => {
            const q = query(collection(db, "users"), where("username", "==", nick.toLowerCase()));
            return await getDocs(q);
        };
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-deep: #141414;
            --accent: #7F49B4;
            --text: #CFCFCF;
            --card: #1c1c1c;
            --input: #0a0a0a;
            --white: #ffffff;
            --error: #ef4444;
            --success: #22c55e;
        }

        body {
            background: var(--bg-deep); color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px;
            overflow: hidden;
        }

        /* Чтобы не мигало при авто-входе */
        #main-container { display: none; }

        .auth-card {
            background: var(--card); padding: 35px; border-radius: 24px;
            width: 100%; max-width: 400px; text-align: center;
            border: 1px solid rgba(127, 73, 180, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        h2 { color: var(--white); margin: 0 0 10px; font-size: 28px; }
        .subtitle { font-size: 14px; opacity: 0.6; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 15px; position: relative; }
        label { display: block; color: var(--accent); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }

        input {
            width: 100%; padding: 12px 14px; background: var(--input);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 10px;
            color: white; font-size: 14px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .toggle-password {
            position: absolute; right: 12px; bottom: 10px;
            width: 20px; height: 20px; cursor: pointer; opacity: 0.4; transition: 0.3s;
            filter: invert(1);
        }
        .toggle-password:hover { opacity: 1; }
        .toggle-password.active { filter: sepia(100%) saturate(500%) hue-rotate(240deg); opacity: 1; }

        .avatar-upload {
            width: 80px; height: 80px; background: var(--input);
            border-radius: 20px; margin: 0 auto 15px; border: 2px dashed var(--accent);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden; position: relative;
        }
        .avatar-upload img { width: 100%; height: 100%; object-fit: cover; }
        #file-input { display: none; }

        .seed-box {
            display: none; background: #000; padding: 15px; border-radius: 10px;
            border: 1px solid var(--accent); color: var(--accent);
            font-family: monospace; font-size: 12px; margin: 15px 0; text-align: left;
            word-break: break-all;
        }

        button {
            width: 100%; padding: 14px; background: var(--accent); color: white;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(127, 73, 180, 0.4); }

        .link { color: var(--accent); font-weight: 600; cursor: pointer; }
        .hidden { display: none; }

        /* --- СТИЛЬ МОДАЛЬНОГО ОКНА --- */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .modal-overlay.active { display: flex; }
        .result-card {
            background: #121212; border: 1px solid rgba(127, 73, 180, 0.3);
            padding: 30px; border-radius: 28px; width: 300px; text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .result-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .icon-success { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .icon-error { background: rgba(239, 68, 68, 0.1); color: var(--error); }
        .result-title { font-size: 20px; font-weight: 800; color: white; margin-bottom: 8px; }
        .result-text { font-size: 14px; opacity: 0.6; margin-bottom: 20px; line-height: 1.4; }
        .btn-ok { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay">
    <div class="result-card">
        <div id="modalIconBox" class="result-icon">
            <i id="modalIcon" data-lucide="check-circle-2"></i>
        </div>
        <div class="result-title" id="modalTitle">Успех</div>
        <div class="result-text" id="modalText">Действие выполнено успешно.</div>
        <button class="btn-ok" onclick="closeModal()">ОК</button>
    </div>
</div>

<div id="main-container">
    <div class="auth-card">
        <h2 id="title">Mewnly</h2>
        <div class="subtitle" id="subtitle">Stealth communication portal</div>

        <div id="reg-fields" class="hidden">
            <div class="avatar-upload" onclick="document.getElementById('file-input').click()">
                <span id="plus" style="font-size: 24px; opacity: 0.5;">+</span>
                <img id="avatar-preview" class="hidden">
            </div>
            <input type="file" id="file-input" accept="image/*" onchange="previewFile()">

            <div class="input-group">
                <label>Real Name</label>
                <input type="text" id="realname" placeholder="Femby GigaChad">
            </div>
            <div class="input-group">
                <label>Birthday</label>
                <input type="date" id="birthdate">
            </div>
        </div>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="super_femboy">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" class="toggle-password" onclick="togglePass('password', this)">
        </div>

        <div class="input-group hidden" id="confirm-group">
            <label>Verify Password</label>
            <input type="password" id="confirm-password">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" class="toggle-password" onclick="togglePass('confirm-password', this)">
        </div>

        <div id="seed-display" class="seed-box"></div>

        <button id="main-btn" onclick="handleAction()">Log In</button>

        <div style="margin-top: 20px; font-size: 13px;">
            <span id="switch-text">New here?</span> 
            <span class="link" onclick="toggleMode()" id="switch-link">Create Account</span>
        </div>
    </div>
</div>

<script>
    let isLogin = true;
    let base64Avatar = "";
    let redirectOnClose = false;

    // Авто-вход
    if (localStorage.getItem('mewnly_user')) {
        window.location.href = 'captcha.html';
    } else {
        document.getElementById('main-container').style.display = 'block';
        lucide.createIcons();
    }

    function togglePass(id, el) {
        const inp = document.getElementById(id);
        inp.type = inp.type === "password" ? "text" : "password";
        el.classList.toggle('active');
    }

    function previewFile() {
        const file = document.getElementById('file-input').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            document.getElementById('avatar-preview').src = reader.result;
            document.getElementById('avatar-preview').classList.remove('hidden');
            document.getElementById('plus').classList.add('hidden');
            base64Avatar = reader.result;
        }
        if (file) reader.readAsDataURL(file);
    }

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('reg-fields').classList.toggle('hidden');
        document.getElementById('confirm-group').classList.toggle('hidden');
        document.getElementById('title').innerText = isLogin ? 'Mewnly' : 'Join Mewnly';
        document.getElementById('main-btn').innerText = isLogin ? 'Log In' : 'Continue';
        document.getElementById('switch-link').innerText = isLogin ? 'Create Account' : 'Log In';
        document.getElementById('seed-display').style.display = 'none';
    }

    function showModal(type, title, text, redirect = false) {
        const overlay = document.getElementById('modalOverlay');
        const iconBox = document.getElementById('modalIconBox');
        const icon = document.getElementById('modalIcon');
        
        redirectOnClose = redirect;
        iconBox.className = type === 'success' ? 'result-icon icon-success' : 'result-icon icon-error';
        icon.setAttribute('data-lucide', type === 'success' ? 'check-circle-2' : 'alert-circle');
        
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalText').innerText = text;
        
        overlay.classList.add('active');
        lucide.createIcons();
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        if (redirectOnClose) {
            window.location.href = 'captcha.html';
        }
    }

    async function handleAction() {
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('main-btn');

        if (!user || !pass) return showModal('error', 'Ошибка', 'Заполните все поля!');

        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            if (isLogin) {
                const querySnapshot = await window.getUserByNick(user);
                if (querySnapshot.empty) throw new Error("Пользователь не найден");
                
                const userData = querySnapshot.docs[0].data();
                await window.firebaseLogin(userData.email, pass);
                
                localStorage.setItem('mewnly_user', user);
                showModal('success', 'Вход выполнен', 'Добро пожаловать!', true);

            } else {
                const seedBox = document.getElementById('seed-display');
                if (seedBox.style.display !== 'block') {
                    if (await window.isUsernameTaken(user)) throw new Error("Никнейм уже занят!");
                    
                    const words = ["alpha", "arctic", "atlas", "aurora", "axis", "azure", "beacon", "boreal", "bullet", "canyon", "carbon", "cobalt", "comet", "copper", "cosmic", "crater", "crypto", "crystal", "cyber", "delta", "digit", "dragon", "drift", "eagle", "echo", "eclipse", "ember", "engine", "energy", "enigma", "ethnic", "falcon", "fiber", "flame", "flare", "flash", "flight", "fossil", "frozen", "fusion", "galaxy", "gamma", "ghost", "glacier", "glass", "gravity", "grid", "habit", "helix", "hollow", "horizon", "hybrid", "hyper", "icon", "igloo", "impact", "indigo", "infinity", "infra", "ivory", "jet", "jewel", "jester", "jump", "jungle", "karma", "keen", "kinetic", "lava", "legend", "lens", "leopard", "level", "light", "lunar", "macro", "magic", "magnet", "magma", "mantle", "marble", "marine", "mars", "master", "medal", "melody", "metal", "meteor", "micro", "mind", "mirror", "mist", "mobile", "modern", "module", "moment", "moon", "motive", "mountain", "mystic"];
                    const seed = Array.from({length: 12}, () => words[Math.floor(Math.random()*words.length)]).join(" ");
                    
                    seedBox.innerText = "SAVE YOUR SEED:\n\n" + seed;
                    seedBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = "I saved it. Finalize Register";
                    return;
                }

                const email = `${user}@mewnly.internal`;
                const userCredential = await window.firebaseRegister(email, pass);
                
                await window.saveUserData(userCredential.user.uid, {
                    username: user,
                    email: email,
                    realName: document.getElementById('realname').value,
                    birthDate: document.getElementById('birthdate').value,
                    avatar: base64Avatar,
                    seed: seedBox.innerText,
                    createdAt: new Date().toISOString()
                });

                localStorage.setItem('mewnly_user', user);
                showModal('success', 'Аккаунт создан', 'Теперь нужно пройти проверку', true);
            }
        } catch (e) {
            showModal('error', 'Ошибка', e.message);
            btn.disabled = false;
            btn.innerText = isLogin ? "Log In" : "Continue";
        }
    }
</script>

</body>
</html>
