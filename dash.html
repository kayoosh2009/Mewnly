<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewnly — Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0f0c13;
            --card-bg: #1a1625;
            --accent-pink: #ff75a0;
            --accent-purple: #9d81ff;
            --text-main: #e0e0e0;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR (Burger Menu) --- */
        .sidebar {
            position: fixed;
            left: calc(-1 * var(--sidebar-width));
            top: 0;
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(26, 22, 37, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: left 0.3s ease;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .sidebar.open { left: 0; }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 5px;
            transition: background 0.2s;
        }

        .menu-item:hover { background: rgba(157, 129, 255, 0.1); color: var(--accent-purple); }
        .menu-item i { margin-right: 15px; }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, var(--accent-pink), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .burger-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 5px;
        }

        /* --- CHAT LIST --- */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .chat-item:hover { transform: scale(1.01); background: #231e33; }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            margin-right: 15px;
            background: #332d4a;
        }

        .chat-details h4 { margin: 0 0 5px 0; color: var(--accent-pink); }
        .chat-details p { margin: 0; font-size: 0.85rem; color: var(--text-dim); }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 90;
        }
        .overlay.active { display: block; }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--accent-pink);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 117, 160, 0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div style="margin-bottom: 30px; padding: 10px;">
            <h2 style="color: var(--accent-pink); margin: 0;">Mewnly 🐾</h2>
            <small style="color: var(--text-dim);">Secure Messenger</small>
        </div>
        
        <a href="menu/profile.html" class="menu-item"><i data-lucide="user"></i> Profile</a>
        <a href="menu/setting.html" class="menu-item"><i data-lucide="settings"></i> Settings</a>
        <a href="menu/secure.html" class="menu-item"><i data-lucide="shield-check"></i> Security</a>
        <a href="menu/creator.html" class="menu-item"><i data-lucide="code"></i> Developer</a>
        
        <div style="margin-top: auto;">
            <a href="#" onclick="logout()" class="menu-item" style="color: #ff4d4d;">
                <i data-lucide="log-out"></i> Logout
            </a>
        </div>
    </nav>

    <div class="main-content">
        <header>
            <button class="burger-btn" onclick="toggleMenu()">
                <i data-lucide="menu"></i>
            </button>
            <div class="user-info">
                <span id="username-text">Guest</span>
                <div class="avatar" id="user-avatar">?</div>
            </div>
        </header>

        <div class="chat-list" id="chat-list-container">
            <div class="chat-item">
                <div class="chat-avatar"></div>
                <div class="chat-details">
                    <h4>Mewnly Support</h4>
                    <p>Welcome to the community! ✨</p>
                </div>
            </div>
            </div>
    </div>

    <div class="fab" onclick="alert('Search for users...')">
        <i data-lucide="plus"></i>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Check Login
        const username = localStorage.getItem('mewnly_user') || 'Guest';
        document.getElementById('username-text').innerText = username;
        document.getElementById('user-avatar').innerText = username.charAt(0).toUpperCase();

        if (username === 'Guest') {
            window.location.href = '../index.html';
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function logout() {
            localStorage.removeItem('mewnly_user');
            window.location.href = '../index.html';
        }

        // Logic to load chats from your Google Sheets "chats" sheet would go here
        async function loadChats() {
            console.log("Fetching chats for:", username);
            // fetch(SCRIPT_URL + "?action=getChats&user=" + username)...
        }
    </script>
</body>
</html>
