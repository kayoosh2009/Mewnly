<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewnly — Secure Dark Messenger 🐾</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f0c13;
            --card-bg: #1a1625;
            --accent-pink: #ff75a0;
            --accent-purple: #9d81ff;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --input-bg: #252033;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1e1b2e, var(--bg-dark));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text-main);
            overflow: hidden;
        }

        .auth-container {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        h1 { color: var(--accent-pink); margin-bottom: 1.5rem; font-size: 2.2rem; text-shadow: 0 0 15px rgba(255, 117, 160, 0.3); }

        .input-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; margin-bottom: 0.6rem; color: var(--text-dim); font-size: 0.85rem; padding-left: 5px; }

        input {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            box-sizing: border-box;
            color: white;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus { border-color: var(--accent-purple); background: #2d273d; box-shadow: 0 0 10px rgba(157, 129, 255, 0.2); }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--accent-pink), var(--accent-purple));
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255, 117, 160, 0.4); }
        button:disabled { opacity: 0.5; cursor: wait; }

        .toggle-link { margin-top: 1.5rem; display: block; color: var(--text-dim); text-decoration: none; font-size: 0.85rem; }
        .toggle-link:hover { color: var(--accent-pink); }

        .seed-phrase {
            display: none;
            background: #12101a;
            padding: 1.2rem;
            border-radius: 16px;
            border: 1px dashed var(--accent-purple);
            margin-top: 1.2rem;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            color: var(--accent-purple);
            font-size: 0.9rem;
            text-align: left;
        }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="auth-container">
    <h1 id="form-title">Mewnly 🐾</h1>
    
    <div id="login-form">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="login-username" placeholder="Enter nickname">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button id="login-btn" onclick="handleAuth('login')">Login</button>
        <a href="#" class="toggle-link" onclick="toggleForms()">New here? Create account</a>
    </div>

    <div id="register-form" class="hidden">
        <div class="input-group">
            <label>Choose Username</label>
            <input type="text" id="reg-username" placeholder="MewUser">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="••••••••">
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="reg-password-confirm" placeholder="••••••••">
        </div>
        
        <div id="seed-display" class="seed-phrase">
            <strong style="color: var(--text-main);">Backup Seed Phrase:</strong><br><br>
            <span id="generated-seed"></span>
            <p style="font-size: 0.75rem; color: var(--accent-pink); margin-top: 10px;">
                ⚠️ SAVE THIS! You cannot recover your account without it.
            </p>
        </div>

        <button id="reg-btn" onclick="handleAuth('register')">Sign Up</button>
        <a href="#" class="toggle-link" onclick="toggleForms()">Already have a profile?</a>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkCZ9TUvCsU8KM9UIXvW1-2Fsc4Ihs3iOiFMRGa-6WAehN3HcU9ePvp0lJzrxmLz6t/exec'; 

    function toggleForms() {
        document.getElementById('login-form').classList.toggle('hidden');
        document.getElementById('register-form').classList.toggle('hidden');
        const isReg = document.getElementById('login-form').classList.contains('hidden');
        document.getElementById('form-title').innerText = isReg ? 'Join Mewnly ✨' : 'Mewnly 🐾';
    }

    // Main Auth Logic
    async function handleAuth(type) {
        const btn = type === 'register' ? document.getElementById('reg-btn') : document.getElementById('login-btn');
        
        if (type === 'register') {
            const user = document.getElementById('reg-username').value.trim();
            const pass = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-password-confirm').value;
            const seedBox = document.getElementById('seed-display');

            if (!user || !pass) return alert("Fill all fields!");
            if (pass !== confirm) return alert("Passwords mismatch!");

            // Step 1: Generate Seed if not visible
            if (seedBox.style.display !== 'block') {
                const words = ["neko", "sparkle", "cloud", "pixel", "dream", "soft", "moon", "star", "cyber", "wave", "pure", "light", "cute", "magic", "paws"];
                let seed = [];
                for(let i=0; i<12; i++) seed.push(words[Math.floor(Math.random() * words.length)]);
                document.getElementById('generated-seed').innerText = seed.join(" ");
                seedBox.style.display = 'block';
                btn.innerText = "I saved it, Register!";
                return;
            }

            // Step 2: Send Registration
            const passHash = CryptoJS.SHA256(pass).toString();
            const seedPhrase = document.getElementById('generated-seed').innerText;
            
            await apiRequest({
                action: 'register',
                username: user,
                password: passHash,
                seed: seedPhrase
            }, btn);

        } else {
            // Login Logic
            const user = document.getElementById('login-username').value.trim();
            const pass = document.getElementById('login-password').value;
            if (!user || !pass) return alert("Enter credentials!");

            const passHash = CryptoJS.SHA256(pass).toString();
            await apiRequest({
                action: 'login',
                username: user,
                password: passHash
            }, btn);
        }
    }

    async function apiRequest(payload, button) {
        button.disabled = true;
        const oldText = button.innerText;
        button.innerText = "Syncing...";

        try {
            // We use no-cors because Apps Script doesn't return easy-to-read headers
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: JSON.stringify(payload)
            });

            // If we are here, fetch "fired". In no-cors we assume success.
            localStorage.setItem('mewnly_user', payload.username);
            
            setTimeout(() => {
                window.location.href = 'app/dash.html';
            }, 1000);

        } catch (err) {
            console.error(err);
            alert("API Error. Check console.");
            button.disabled = false;
            button.innerText = oldText;
        }
    }
</script>
</body>
</html>
