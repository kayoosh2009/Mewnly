<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mewnly — Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, orderBy, onSnapshot, serverTimestamp, or, and, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3YsqmPng3BdsgbZXs-Ok1c5Z4e1HZhkY",
            authDomain: "mewnly.firebaseapp.com",
            projectId: "mewnly",
            storageBucket: "mewnly.firebasestorage.app",
            messagingSenderId: "854522459869",
            appId: "1:854522459869:web:edc0df5aad55ca1f4e8d34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Единый глобальный объект для работы с БД
        window.fb = { 
            db, collection, query, where, getDocs, addDoc, 
            orderBy, onSnapshot, serverTimestamp, or, and, deleteDoc, doc 
        };

        window.loadFirebaseProfile = async (username) => {
            if(!username) return null;
            const q = query(collection(db, "users"), where("username", "==", username.toLowerCase()));
            const snap = await getDocs(q);
            return !snap.empty ? snap.docs[0].data() : null;
        };
        window.firebaseLogout = () => signOut(auth);
    </script>
    
    <style>
        :root {
            --bg-deep: #0f0f0f;
            --bg-card: #161616;
            --accent: #7F49B4;
            --text-gray: #a0a0a0;
            --white: #ffffff;
            --border: rgba(127, 73, 180, 0.15);
        }

        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-deep); color: var(--text-gray); font-family: 'Inter', sans-serif; overflow: hidden; }

        .app-container { display: flex; width: 100%; height: 100vh; }

        /* --- DRAWER (БУРГЕР МЕНЮ) --- */
        .drawer {
            position: fixed; left: -310px; top: 0; width: 300px; height: 100%;
            background: #111; border-right: 1px solid var(--border);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000; display: flex; flex-direction: column;
        }
        .drawer.open { transform: translateX(310px); box-shadow: 15px 0 40px rgba(0,0,0,0.9); }

        .drawer-content { flex: 1; padding: 20px; overflow-y: auto; }
        .drawer-header { padding: 20px 0; color: var(--white); font-weight: 800; font-size: 24px; display: flex; align-items: center; gap: 10px; }

        .nav-link {
            width: 100%; background: none; border: none; color: var(--text-gray);
            padding: 14px 16px; display: flex; align-items: center; gap: 14px;
            cursor: pointer; border-radius: 12px; transition: 0.2s; font-size: 16px; margin-bottom: 6px;
        }
        .nav-link:hover { background: rgba(127, 73, 180, 0.1); color: var(--white); }
        .nav-link i { color: var(--accent); }

        .drawer-footer { background: #0a0a0a; border-top: 1px solid var(--border); padding: 15px; }
        .profile-card {
            background: #181818; border-radius: 16px; padding: 12px;
            display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.03);
            cursor: pointer; transition: 0.2s;
        }
        .profile-card:hover { border-color: var(--accent); }

        /* --- SIDEBAR (СПИСОК ЧАТОВ) --- */
        .sidebar { width: 350px; min-width: 350px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .burger-btn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 8px; display: flex; align-items: center; }

        .search-box {
            flex: 1; background: #080808; border-radius: 12px; padding: 8px 12px; 
            display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }

        #chatList { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item {
            padding: 12px; display: flex; align-items: center; gap: 14px; 
            cursor: pointer; border-radius: 14px; transition: 0.2s; margin-bottom: 4px;
        }
        .chat-item:hover { background: rgba(255,255,255,0.03); }
        .chat-item.active { background: rgba(127, 73, 180, 0.15); }

        /* --- MAIN VIEW & MESSAGES --- */
        .main-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-deep); position: relative; }
        
        #empty-view { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }
        .welcome-title { font-size: 80px; font-weight: 900; color: var(--accent); letter-spacing: -4px; margin: 0; }
        .clock { font-size: 20px; letter-spacing: 5px; opacity: 0.5; margin-top: 10px; }

        #chat-window { display: none; flex-direction: column; height: 100%; }
        .chat-header { padding: 15px 25px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .messages-container { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }

        /* СТИЛЬ СООБЩЕНИЙ */
        .msg { max-width: 65%; padding: 12px 16px; border-radius: 18px; font-size: 15px; color: var(--white); position: relative; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: #222; border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-bottom: 5px; display: block; }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 5px; display: block; text-align: right; }

        .input-area { padding: 15px 25px; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; gap: 15px; align-items: center; }
        .input-area input { flex: 1; background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; padding: 12px 15px; color: white; font-size: 15px; }

        /* --- AVATARS --- */
        .p-avatar {
            width: 48px; height: 48px; min-width: 48px; background: var(--accent); border-radius: 14px;
            display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; font-weight: 700;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }
        .p-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* --- CONTEXT MENU --- */
        #context-menu { position: fixed; background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px; width: 180px; display: none; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .menu-item { padding: 12px 15px; font-size: 14px; color: white; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background: var(--accent); }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1500; }
        .overlay.active { display: block; }

        @media (max-width: 850px) { 
            .sidebar { width: 100%; } 
            .main-panel { display: none; } 
            .main-panel.active { display: flex; position: fixed; inset: 0; z-index: 100; }
        }
    </style>
</head>
<body>

    <div id="context-menu">
        <div class="menu-item" id="menu-copy"><i data-lucide="copy" size="16"></i> Копировать</div>
        <div class="menu-item" id="menu-delete" style="color:#ff5e5e;"><i data-lucide="trash-2" size="16"></i> Удалить</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="drawer" id="drawer">
        <div class="drawer-content">
            <div class="drawer-header"><i data-lucide="zap" style="fill: var(--accent)"></i> Mewnly</div>
            <button class="nav-link" onclick="location.href='profile.html'"><i data-lucide="user"></i> Профиль</button>
            <button class="nav-link" onclick="location.href='friends.html'"><i data-lucide="users"></i> Друзья</button>
            <button class="nav-link" onclick="location.href='settings.html'"><i data-lucide="settings"></i> Настройки</button>
            <button class="nav-link" onclick="location.href='updates.html'"><i data-lucide="refresh-cw"></i> Что нового?</button>
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);">
                <button class="nav-link" onclick="logout()" style="color: #ff5e5e;"><i data-lucide="log-out"></i> Выход</button>
            </div>
        </div>
        <div class="drawer-footer">
            <div class="profile-card" onclick="location.href='profile.html'">
                <div class="p-avatar" id="footer-avatar">?</div>
                <div style="overflow:hidden; line-height:1.2;">
                    <span style="display:block; color:white; font-weight:600; font-size:14px;" id="footer-name">...</span>
                    <span style="display:block; color:var(--accent); font-size:11px; font-weight:700;" id="footer-nick">@user</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="burger-btn" onclick="toggleMenu()"><i data-lucide="menu"></i></button>
                <div class="search-box" onclick="location.href='search.html'">
                    <i data-lucide="search" size="16" style="opacity: 0.3;"></i>
                    <span style="font-size: 14px; opacity:0.5;">Поиск</span>
                </div>
            </div>
            <div id="chatList"></div>
        </aside>

        <main class="main-panel" id="main-panel">
            <div id="empty-view">
                <h1 class="welcome-title">Mewnly</h1>
                <div class="clock" id="clock">00:00:00</div>
            </div>

            <div id="chat-window">
                <header class="chat-header">
                    <button onclick="closeChat()" style="background:none; border:none; color:white; margin-right:15px; cursor:pointer;" class="mobile-only"><i data-lucide="arrow-left"></i></button>
                    <div class="p-avatar" id="active-avatar" style="width:40px; height:40px;">?</div>
                    <div>
                        <div id="active-name" style="color:white; font-weight:700; font-size:16px;">Чат</div>
                        <div id="active-status" style="font-size:12px; color:var(--accent);">online</div>
                    </div>
                </header>
                <div class="messages-container" id="messages"></div>
                <form class="input-area" id="chatForm">
                    <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this)">
                    <button type="button" onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:var(--accent); cursor:pointer;"><i data-lucide="paperclip"></i></button>
                    <input type="text" id="msgInput" placeholder="Напишите сообщение..." autocomplete="off">
                    <button type="submit" style="background:var(--accent); border:none; color:white; border-radius:10px; padding:10px 15px; cursor:pointer;"><i data-lucide="send" size="20"></i></button>
                </form>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const myNick = localStorage.getItem('mewnly_user');
        let currentPartner = null;
        let unsubscribe = null;
        let pendingImg = null;

        function toggleMenu() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('ru-RU');
        }
        setInterval(updateClock, 1000);

        async function openChat(nick) {
            currentPartner = nick;
            document.getElementById('empty-view').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('main-panel').classList.add('active');

            const p = await window.loadFirebaseProfile(nick);
            document.getElementById('active-name').innerText = p?.realName || nick;
            document.getElementById('active-avatar').innerHTML = p?.avatar ? `<img src="${p.avatar}">` : nick[0].toUpperCase();

            if (unsubscribe) unsubscribe();
            const q = window.fb.query(
                window.fb.collection(window.fb.db, "messages"),
                window.fb.or(
                    window.fb.and(window.fb.where("from", "==", myNick), window.fb.where("to", "==", nick)),
                    window.fb.and(window.fb.where("from", "==", nick), window.fb.where("to", "==", myNick))
                ),
                window.fb.orderBy("createdAt", "asc")
            );

            unsubscribe = window.fb.onSnapshot(q, (snap) => {
                const box = document.getElementById('messages');
                box.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    const isMe = data.from === myNick;
                    const time = data.createdAt ? data.createdAt.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '..';
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'sent' : 'received'}`;
                    div.innerHTML = `${data.image ? `<img src="${data.image}">` : ''} <div>${data.text || ''}</div> <span class="msg-time">${time}</span>`;
                    div.oncontextmenu = (e) => showCtx(e, doc.id, data.text, isMe);
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = () => { pendingImg = reader.result; alert("Изображение готово!"); };
            reader.readAsDataURL(input.files[0]);
        }

        document.getElementById('chatForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('msgInput');
            if (!input.value && !pendingImg) return;

            await window.fb.addDoc(window.fb.collection(window.fb.db, "messages"), {
                from: myNick, to: currentPartner,
                text: input.value, image: pendingImg,
                createdAt: window.fb.serverTimestamp()
            });
            input.value = ''; pendingImg = null;
        };

        function showCtx(e, id, text, isMe) {
            e.preventDefault();
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
            document.getElementById('menu-copy').onclick = () => { navigator.clipboard.writeText(text); menu.style.display='none'; };
            const del = document.getElementById('menu-delete');
            del.style.display = isMe ? 'flex' : 'none';
            del.onclick = async () => { await window.fb.deleteDoc(window.fb.doc(window.fb.db, "messages", id)); menu.style.display='none'; };
        }

        document.addEventListener('click', () => document.getElementById('context-menu').style.display='none');

        async function init() {
            // Загрузка своего профиля
            const me = await window.loadFirebaseProfile(myNick);
            if (me) {
                document.getElementById('footer-name').innerText = me.realName || "Без имени";
                document.getElementById('footer-nick').innerText = "@" + me.username;
                if (me.avatar) document.getElementById('footer-avatar').innerHTML = `<img src="${me.avatar}">`;
            }

            // Список чатов
            const recent = JSON.parse(localStorage.getItem('recent_chats') || '[]');
            const list = document.getElementById('chatList');
            list.innerHTML = recent.length ? '' : '<p style="text-align:center; opacity:0.3; font-size:13px;">Пусто</p>';
            for (const nick of recent) {
                const p = await window.loadFirebaseProfile(nick);
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.innerHTML = `<div class="p-avatar">${p?.avatar ? `<img src="${p.avatar}">` : nick[0].toUpperCase()}</div>
                                  <div style="overflow:hidden;"><div style="color:white; font-weight:600;">${p?.realName || nick}</div><div style="color:var(--accent); font-size:11px;">@${nick}</div></div>`;
                item.onclick = () => openChat(nick);
                list.appendChild(item);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
