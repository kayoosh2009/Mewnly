<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewnly — Проверка</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/captcha.css">
</head>
<body>

<div class="modal-overlay" id="modalOverlay">
    <div class="result-card">
        <div id="modalIconBox" class="result-icon">
            <i id="modalIcon" data-lucide="check-circle-2" size="32"></i>
        </div>
        <div class="result-title" id="modalTitle">Успех!</div>
        <div class="result-text" id="modalText">Вы подтвердили, что вы человек.</div>
        <button class="btn-ok" onclick="closeModal()">ОК</button>
    </div>
</div>

<div class="captcha-box" id="captchaBox">
    <div class="header">
        <p>Выберите все квадраты, где есть</p>
        <h2 id="target-name">Фембой</h2>
    </div>

    <div class="grid" id="grid"></div>

    <div class="footer">
        <i data-lucide="refresh-cw" style="cursor:pointer; opacity:0.5" onclick="generateGrid()"></i>
        <button class="btn-verify" onclick="checkCaptcha()">Подтвердить</button>
    </div>
</div>

<script src="../js/captcha.js"></script>

</body>
</html>
