<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mewnly Ultimate Messenger</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --accent: #7F49B4;
            --accent-soft: rgba(127, 73, 180, 0.2); --border: rgba(255, 255, 255, 0.05);
            --text: #efefef; --text-dim: #888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; display: flex; flex-direction: column; }

        /* СКРОЛЛ */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* HEADER */
        .header {
            height: 65px; background: var(--card); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100; flex-shrink: 0;
        }
        .user-info { display: flex; align-items: center; gap: 12px; cursor: pointer; flex: 1; }
        .u-avatar { width: 40px; height: 40px; border-radius: 12px; background: var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .u-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* MESSAGES */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; position: relative; }
        .sent { align-self: flex-end; align-items: flex-end; }
        .received { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; position: relative; word-break: break-word; min-width: 80px; }
        .sent .msg { background: var(--accent); border-bottom-right-radius: 4px; }
        .received .msg { background: #1e1e1e; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        /* ИНФОРМАЦИЯ О СООБЩЕНИИ (ВРЕМЯ + СТАТУС) */
        .msg-info {
            font-size: 10px; opacity: 0.6; margin-top: 6px; display: flex; align-items: center; gap: 4px; justify-content: flex-end; font-weight: 600;
        }
        .sent .msg-info { color: rgba(255, 255, 255, 0.9); }

        /* ДАТА */
        .date-divider { display: flex; align-items: center; justify-content: center; margin: 20px 0; color: var(--text-dim); font-size: 12px; font-weight: 700; }
        .date-divider::before, .date-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 15px; }

        /* ЦИТАТА (ОТВЕТ) */
        .reply-block { font-size: 12px; opacity: 0.8; margin-bottom: 8px; padding-left: 10px; border-left: 3px solid #fff; border-radius: 2px; }
        .received .reply-block { border-color: var(--accent); }

        /* MARKDOWN */
        b { font-weight: 800; color: #fff; }
        i { font-style: italic; }
        s { text-decoration: line-through; opacity: 0.7; }
        code { font-family: 'Fira Code', monospace; background: rgba(0,0,0,0.4); padding: 2px 5px; border-radius: 4px; color: #e5c07b; }
        .code-block { background: #050505; border: 1px solid var(--border); border-radius: 10px; margin: 8px 0; overflow: hidden; width: 100%; }
        .code-header { background: #111; padding: 6px 12px; font-size: 10px; display: flex; justify-content: space-between; color: var(--text-dim); font-weight: 800; }
        .code-content { padding: 12px; font-size: 13px; white-space: pre-wrap; font-family: 'Fira Code'; overflow-x: auto; }
        .copy-btn { color: var(--accent); cursor: pointer; font-weight: 800; }

        /* MEDIA */
        .img-preview { max-width: 100%; border-radius: 10px; margin-bottom: 5px; cursor: pointer; }
        .file-size { font-size: 10px; opacity: 0.5; margin-bottom: 4px; display: block; font-weight: 800; }
        audio { height: 35px; width: 220px; filter: invert(1) hue-rotate(250deg); margin-top: 5px; outline: none; }

        /* INPUT AREA */
        .input-container { background: var(--card); border-top: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        
        #reply-preview { display: none; padding: 10px 15px; background: rgba(0,0,0,0.2); border-left: 3px solid var(--accent); font-size: 12px; position: relative; }
        #reply-text { opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        
        .input-area { padding: 12px; display: flex; align-items: flex-end; gap: 10px; min-height: 70px; }
        #msgInput { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 20px; padding: 12px 15px; color: white; outline: none; font-size: 15px; max-height: 150px; resize: none; font-family: inherit; }
        .action-btn { background: var(--accent); border: none; width: 44px; height: 44px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
        .recording { background: #ff4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* CONTEXT MENU */
        #ctx-menu { position: fixed; background: #1a1a1a; border: 1px solid var(--border); border-radius: 12px; padding: 5px; z-index: 1000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 160px; }
        .ctx-item { padding: 10px 12px; font-size: 13px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 8px; font-weight: 600; }
        .ctx-item:hover { background: var(--accent); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

<div id="ctx-menu">
    <div class="ctx-item" id="ctx-reply"><i data-lucide="reply" size="16"></i> Ответить</div>
    <div class="ctx-item" id="ctx-copy"><i data-lucide="copy" size="16"></i> Копировать</div>
    <div class="ctx-item" id="ctx-edit"><i data-lucide="edit-3" size="16"></i> Изменить</div>
    <div class="ctx-item" id="ctx-delete" style="color:#ff5e5e"><i data-lucide="trash-2" size="16"></i> Удалить</div>
</div>

<div class="modal" id="mediaModal" onclick="this.style.display='none'"><img id="modalImg" style="max-width:100%; max-height:100%; border-radius:12px; object-fit:contain;"></div>

<div class="header">
    <div class="user-info" onclick="window.parent.openProfile(partner)">
        <div class="u-avatar" id="h-avatar">?</div>
        <div>
            <div id="h-name" style="font-weight:800; font-size:15px;">...</div>
            <div style="font-size:10px; color:var(--accent); font-weight:800;">ONLINE</div>
        </div>
    </div>
    <i data-lucide="search" size="20" style="color:var(--text-dim); cursor:pointer;"></i>
</div>

<div id="messages"></div>

<div class="input-container">
    <div id="reply-preview">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b id="reply-to" style="color:var(--accent);">Ответ</b>
            <i data-lucide="x" size="14" style="cursor:pointer; opacity:0.6;" onclick="cancelReply()"></i>
        </div>
        <div id="reply-text">...</div>
    </div>
    
    <div class="input-area">
        <label for="fileInp" style="padding:10px; color:var(--text-dim); cursor:pointer;"><i data-lucide="image" size="24"></i></label>
        <input type="file" id="fileInp" style="display:none;" accept="image/*" onchange="handleImage(this)">
        
        <textarea id="msgInput" placeholder="Сообщение..." rows="1" oninput="autoSize(this)"></textarea>
        
        <button class="action-btn" id="mainBtn" onclick="handleSend()"><i data-lucide="mic" id="btnIcon" size="20"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB3YsqmPng3BdsgbZXs-Ok1c5Z4e1HZhkY",
        authDomain: "mewnly.firebaseapp.com",
        projectId: "mewnly",
        storageBucket: "mewnly.firebasestorage.app",
        messagingSenderId: "854522459869",
        appId: "1:854522459869:web:edc0df5aad55ca1f4e8d34"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const partner = new URLSearchParams(window.location.search).get('user');
    const me = localStorage.getItem('mewnly_user');

    let isEditing = false, editId = null, isRecording = false, recorder, chunks = [];
    let replyData = null;

    // --- MARKDOWN ПОЛНЫЙ ПАРСЕР ---
    function parseMd(t) {
        if(!t) return "";
        t = t.replace(/```([\s\S]*?)```/g, (m, c) => `
            <div class="code-block">
                <div class="code-header">CODE <span class="copy-btn" onclick="copyCode(this)">COPY</span></div>
                <div class="code-content">${c.trim()}</div>
            </div>`);
        t = t.replace(/\*\*(.*?)\*\*/g, '<code>$1</code>'); // **код**
        t = t.replace(/\*(.*?)\*/g, '<b>$1</b>'); // *жирный*
        t = t.replace(/__(.*?)__/g, '<s>$1</s>'); // __зачеркнутый__
        t = t.replace(/\/\/(.*?)\/\//g, '<i>$1</i>'); // //курсив//
        return t.replace(/\n/g, '<br>');
    }

    window.copyCode = (btn) => {
        const code = btn.closest('.code-block').querySelector('.code-content').innerText;
        navigator.clipboard.writeText(code);
        btn.innerText = "COPIED!";
        setTimeout(() => btn.innerText = "COPY", 2000);
    };

    // --- ЛОГИКА ИНТЕРФЕЙСА ---
    const msgInput = document.getElementById('msgInput');
    
    window.autoSize = (el) => {
        el.style.height = '40px';
        el.style.height = el.scrollHeight + 'px';
        const icon = document.getElementById('btnIcon');
        icon.setAttribute('data-lucide', el.value.trim() ? 'send' : 'mic');
        lucide.createIcons();
    };

    // Отправка по Enter, спуск по Shift+Enter
    msgInput.onkeydown = (e) => {
        if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    };

    window.cancelReply = () => {
        replyData = null;
        document.getElementById('reply-preview').style.display = 'none';
    };

    window.handleSend = () => {
        const text = msgInput.value.trim();
        if(text) {
            if(isEditing) {
                updateDoc(doc(db, "messages", editId), { text, isEdited: true });
                isEditing = false;
            } else {
                send({ text, type: 'text', replyTo: replyData });
            }
            msgInput.value = '';
            autoSize(msgInput);
            cancelReply();
        } else {
            toggleMic();
        }
    };

    // --- ГС И ФАЙЛЫ ---
    async function toggleMic() {
        if(!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/ogg' });
                const r = new FileReader();
                r.readAsDataURL(blob);
                r.onloadend = () => send({ audio: r.result, type: 'audio' });
            };
            recorder.start();
            isRecording = true;
            document.getElementById('mainBtn').classList.add('recording');
        } else {
            recorder.stop();
            isRecording = false;
            document.getElementById('mainBtn').classList.remove('recording');
        }
    }

    window.handleImage = (inp) => {
        const f = inp.files[0];
        if(!f) return;
        const size = (f.size / 1024).toFixed(1) + " KB";
        const r = new FileReader();
        r.onload = (e) => send({ img: e.target.result, size, type: 'image' });
        r.readAsDataURL(f);
    };

    async function send(data) {
        await addDoc(collection(db, "messages"), { from: me, to: partner, ...data, isRead: false, createdAt: serverTimestamp() });
    }

    // --- КОНТЕКСТНОЕ МЕНЮ (ПКМ) ---
    window.onMsgCtx = (e, id, text, from) => {
        e.preventDefault();
        const menu = document.getElementById('ctx-menu');
        menu.style.display = 'block';
        
        // Защита от выхода меню за экран
        let x = e.pageX; let y = e.pageY;
        if(x + 160 > window.innerWidth) x -= 160;
        if(y + 150 > window.innerHeight) y -= 150;
        menu.style.left = x + 'px'; menu.style.top = y + 'px';
        
        document.getElementById('ctx-edit').style.display = from === me ? 'flex' : 'none';
        document.getElementById('ctx-delete').style.display = from === me ? 'flex' : 'none';

        // Кнопка Копировать
        document.getElementById('ctx-copy').onclick = () => {
            navigator.clipboard.writeText(text);
            menu.style.display = 'none';
        };

        // Кнопка Ответить
        document.getElementById('ctx-reply').onclick = () => {
            replyData = { id, text, user: from };
            document.getElementById('reply-preview').style.display = 'block';
            document.getElementById('reply-text').innerText = text;
            msgInput.focus();
            menu.style.display = 'none';
        };

        // Кнопка Удалить
        document.getElementById('ctx-delete').onclick = () => {
            if(confirm("Точно удалить?")) deleteDoc(doc(db, "messages", id));
            menu.style.display = 'none';
        };

        // Кнопка Изменить
        document.getElementById('ctx-edit').onclick = () => {
            isEditing = true; editId = id;
            msgInput.value = text;
            msgInput.focus();
            autoSize(msgInput);
            menu.style.display = 'none';
        };
    };

    document.onclick = (e) => {
        if(!e.target.closest('#ctx-menu')) document.getElementById('ctx-menu').style.display = 'none';
    };

    // --- ЗАГРУЗКА И ОТРИСОВКА СООБЩЕНИЙ ---
    function listen() {
        const q = query(collection(db, "messages"), where("from", "in", [me, partner]), where("to", "in", [me, partner]), orderBy("createdAt", "asc"));
        
        onSnapshot(q, (snap) => {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            let lastDate = "";

            snap.forEach(s => {
                const m = s.data();
                const isMe = m.from === me;
                
                if(!isMe && !m.isRead) updateDoc(doc(db, "messages", s.id), { isRead: true });

                // ПОЛОСКА ДАТЫ: ______ 3 марта ________
                const currentDate = m.createdAt ? m.createdAt.toDate().toLocaleDateString('ru-RU', {day:'numeric', month:'long'}) : "";
                if(currentDate !== lastDate && currentDate !== "") {
                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'date-divider';
                    dateDiv.innerText = currentDate;
                    box.appendChild(dateDiv);
                    lastDate = currentDate;
                }

                const wrap = document.createElement('div');
                wrap.className = `msg-wrapper ${isMe ? 'sent' : 'received'}`;
                
                // Рендер контента
                let content = '';
                if(m.type === 'image') {
                    content = `<span class="file-size">${m.size}</span><img src="${m.img}" class="img-preview" onclick="document.getElementById('modalImg').src='${m.img}'; document.getElementById('mediaModal').style.display='flex'">`;
                } else if(m.type === 'audio') {
                    content = `<audio controls src="${m.audio}"></audio>`;
                } else {
                    content = parseMd(m.text || '');
                }

                // Ответ на сообщение (Цитата)
                let replyHtml = '';
                if(m.replyTo) {
                    replyHtml = `<div class="reply-block"><b>${m.replyTo.user === me ? 'Вы' : m.replyTo.user}</b><br>${m.replyTo.text}</div>`;
                }

                const time = m.createdAt ? m.createdAt.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--';
                const statusIcon = isMe ? (m.isRead ? '<i data-lucide="check-check" size="14" style="color:#a855f7"></i>' : '<i data-lucide="check" size="14"></i>') : '';
                const editedMark = m.isEdited ? '<span style="margin-right:4px;">(изм.)</span>' : '';

                // Обертка сообщения со ВРЕМЕНЕМ ВНУТРИ
                wrap.innerHTML = `
                    <div class="msg" oncontextmenu="onMsgCtx(event, '${s.id}', '${m.text ? m.text.replace(/'/g, "\\'") : ''}', '${m.from}')">
                        ${replyHtml}
                        ${content}
                        <div class="msg-info">
                            ${editedMark}
                            <span>${time}</span>
                            <span style="display:flex;">${statusIcon}</span>
                        </div>
                    </div>
                `;
                
                box.appendChild(wrap);
            });
            
            box.scrollTop = box.scrollHeight;
            lucide.createIcons();
        });
    }

    async function init() {
        const s = await getDocs(query(collection(db, "users"), where("username", "==", partner)));
        if(!s.empty) {
            const d = s.docs[0].data();
            document.getElementById('h-name').innerText = d.realName || partner;
            if(d.avatar) document.getElementById('h-avatar').innerHTML = `<img src="${d.avatar}">`;
        }
        listen();
    }
    init(); lucide.createIcons();
</script>
</body>
</html>
