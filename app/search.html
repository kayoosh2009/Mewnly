<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewnly — Поиск в сети</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, or } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3YsqmPng3BdsgbZXs-Ok1c5Z4e1HZhkY",
            authDomain: "mewnly.firebaseapp.com",
            projectId: "mewnly",
            storageBucket: "mewnly.firebasestorage.app",
            messagingSenderId: "854522459869",
            appId: "1:854522459869:web:edc0df5aad55ca1f4e8d34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция глобального поиска
        window.findUsers = async (searchQuery) => {
            const q = query(
                collection(db, "users"),
                or(
                    where("username", "==", searchQuery.toLowerCase()),
                    where("realName", "==", searchQuery),
                    where("userId", "==", searchQuery) // Поиск по ID
                )
            );
            const snap = await getDocs(q);
            let results = [];
            snap.forEach(doc => results.push({ id: doc.id, ...doc.data() }));
            return results;
        };
    </script>

    <style>
        :root {
            --bg-deep: #0f0f0f;
            --bg-card: #161616;
            --accent: #7F49B4;
            --text-gray: #a0a0a0;
            --white: #ffffff;
            --border: rgba(127, 73, 180, 0.15);
        }

        body {
            margin: 0; background: var(--bg-deep); color: var(--text-gray);
            font-family: 'Inter', sans-serif; min-height: 100vh; padding: 20px;
        }

        .search-container { max-width: 600px; margin: 0 auto; }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .back-btn { background: var(--bg-card); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 12px; cursor: pointer; }

        /* Поле поиска */
        .search-bar-wrapper {
            display: flex; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; padding: 10px 20px; align-items: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-bar-wrapper input {
            flex: 1; background: none; border: none; color: white; font-size: 16px; outline: none;
        }
        .qr-trigger { color: var(--accent); cursor: pointer; transition: 0.3s; }
        .qr-trigger:hover { transform: scale(1.1); }

        /* Результаты */
        .results-list { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .user-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px;
            padding: 15px; display: flex; align-items: center; gap: 15px;
            animation: slideUp 0.3s ease; transition: 0.2s;
        }
        .user-card:hover { border-color: var(--accent); background: #1c1c1c; }

        .u-avatar {
            width: 55px; height: 55px; background: var(--accent); border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800; color: white; overflow: hidden;
        }
        .u-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .u-info { flex: 1; }
        .u-name { display: block; color: white; font-weight: 700; font-size: 15px; }
        .u-nick { color: var(--accent); font-size: 12px; font-weight: 800; }

        .msg-btn {
            background: var(--accent); color: white; border: none; padding: 10px 18px;
            border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        /* Сканер */
        #reader {
            width: 100%; max-width: 400px; margin: 20px auto;
            border-radius: 20px; overflow: hidden; display: none;
            border: 2px solid var(--accent) !important;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="header">
            <button class="back-btn" onclick="location.href='dash.html'"><i data-lucide="arrow-left"></i></button>
            <h1 style="color:white; font-size: 24px; margin:0;">Network Search</h1>
        </div>

        <div class="search-bar-wrapper">
            <i data-lucide="search" size="20"></i>
            <input type="text" id="searchInput" placeholder="Имя, @никнейм или ID..." oninput="doSearch()">
            <div class="qr-trigger" onclick="toggleScanner()"><i data-lucide="qr-code"></i></div>
        </div>

        <div id="reader"></div>

        <div class="results-list" id="results">
            <div style="text-align: center; margin-top: 50px; opacity: 0.3;">
                <i data-lucide="users" size="48" style="margin-bottom: 10px;"></i>
                <p>Введите данные для поиска в базе Mewnly</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let html5QrCode = null;

        async function doSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');

            if (query.length < 2) {
                resultsDiv.innerHTML = `<div style="text-align:center; margin-top:50px; opacity:0.3;"><p>Минимум 2 символа для поиска</p></div>`;
                return;
            }

            const users = await window.findUsers(query);
            
            if (users.length === 0) {
                resultsDiv.innerHTML = `<p style="text-align:center;">Пользователь не найден</p>`;
                return;
            }

            resultsDiv.innerHTML = users.map(user => `
                <div class="user-card">
                    <div class="u-avatar">
                        ${user.avatar ? `<img src="${user.avatar}">` : user.username[0].toUpperCase()}
                    </div>
                    <div class="u-info">
                        <span class="u-name">${user.realName || 'No Name'}</span>
                        <span class="u-nick">@${user.username}</span>
                    </div>
                    <button class="msg-btn" onclick="openChat('${user.username}')">
                        <i data-lucide="message-circle" size="18"></i> Написать
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openChat(username) {
            // Логика: добавляем пользователя в список "недавних" и переходим на главную
            let recent = JSON.parse(localStorage.getItem('recent_chats') || '[]');
            if (!recent.includes(username)) recent.push(username);
            localStorage.setItem('recent_chats', JSON.stringify(recent));
            
            location.href = 'dash.html';
        }

        // Логика QR-Сканера
        function toggleScanner() {
            const readerDiv = document.getElementById('reader');
            if (readerDiv.style.display === 'block') {
                html5QrCode.stop();
                readerDiv.style.display = 'none';
            } else {
                readerDiv.style.display = 'block';
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        document.getElementById('searchInput').value = decodedText;
                        doSearch();
                        toggleScanner(); // Выключаем после успеха
                    }
                );
            }
        }
    </script>
</body>
</html>
