<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mewnly — Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3YsqmPng3BdsgbZXs-Ok1c5Z4e1HZhkY",
            authDomain: "mewnly.firebaseapp.com",
            projectId: "mewnly",
            storageBucket: "mewnly.firebasestorage.app",
            messagingSenderId: "854522459869",
            appId: "1:854522459869:web:edc0df5aad55ca1f4e8d34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.loadFirebaseProfile = async (username) => {
            const q = query(collection(db, "users"), where("username", "==", username.toLowerCase()));
            const snap = await getDocs(q);
            return !snap.empty ? snap.docs[0].data() : null;
        };
        window.firebaseLogout = () => signOut(auth);
    </script>
    
    <style>
        :root {
            --bg-deep: #0f0f0f;
            --bg-card: #161616;
            --accent: #7F49B4;
            --text-gray: #a0a0a0;
            --white: #ffffff;
            --border: rgba(127, 73, 180, 0.15);
        }

        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-deep); color: var(--text-gray); font-family: 'Inter', sans-serif; overflow: hidden; }

        .app-container { display: flex; width: 100%; height: 100vh; }

        /* --- DRAWER (МЕНЮ) --- */
        .drawer {
            position: fixed; left: -310px; top: 0; width: 300px; height: 100%;
            background: #111; border-right: 1px solid var(--border);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000; display: flex; flex-direction: column;
        }
        .drawer.open { transform: translateX(310px); box-shadow: 15px 0 40px rgba(0,0,0,0.9); }

        /* Верхняя часть меню (Навигация) */
        .drawer-content { flex: 1; padding: 20px; overflow-y: auto; }
        .drawer-header { padding: 20px 0; color: var(--white); font-weight: 800; font-size: 22px; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }

        .nav-link {
            width: 100%; background: none; border: none; color: var(--text-gray);
            padding: 14px 16px; display: flex; align-items: center; gap: 14px;
            cursor: pointer; border-radius: 12px; transition: 0.2s; font-size: 15px; margin-bottom: 6px;
        }
        .nav-link:hover { background: rgba(127, 73, 180, 0.1); color: var(--white); }
        .nav-link i { color: var(--accent); width: 20px; height: 20px; }

        /* НИЖНИЙ ПРОФИЛЬ (ЗАКРЕПЛЕН) */
        .drawer-footer {
            background: #0a0a0a; border-top: 1px solid var(--border);
            padding: 15px;
        }

        .profile-card {
            background: #181818; border-radius: 16px; padding: 12px;
            display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.03);
            cursor: pointer; transition: 0.2s;
        }
        .profile-card:hover { border-color: var(--accent); }

        .p-avatar {
            width: 48px; height: 48px; min-width: 48px;
            background: var(--accent); border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white; font-weight: 700;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }
        .p-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .p-info { overflow: hidden; line-height: 1.2; }
        .p-realname { display: block; color: var(--white); font-weight: 600; font-size: 14px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .p-username { display: block; color: var(--accent); font-size: 11px; font-weight: 700; text-transform: uppercase; margin-top: 2px; }

        /* --- SIDEBAR (ЧАТЫ) --- */
        .sidebar { width: 350px; min-width: 350px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .burger-btn { background: none; border: none; color: var(--accent); cursor: pointer; padding: 8px; display: flex; align-items: center; }

        .search-box {
            flex: 1; background: #080808; border-radius: 12px;
            padding: 8px 12px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05);
        }
        .search-box input { background: none; border: none; color: white; font-size: 14px; width: 100%; }

        /* --- MAIN VIEW --- */
        .main-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-deep); }
        .welcome-title { font-size: 80px; font-weight: 900; color: var(--accent); letter-spacing: -4px; margin: 0; }
        .clock { font-size: 20px; font-weight: 300; letter-spacing: 5px; color: var(--text-gray); margin-top: 10px; opacity: 0.5; }

        /* --- OVERLAY --- */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1500; }
        .overlay.active { display: block; }

        @media (max-width: 850px) { .main-panel { display: none; } .sidebar { width: 100%; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="drawer" id="drawer">
        <div class="drawer-content">
            <div class="drawer-header">
                <i data-lucide="zap" style="fill: var(--accent)"></i> Mewnly
            </div>
            <button class="nav-link" onclick="location.href='profile.html'"><i data-lucide="user"></i> Профиль</button>
            <button class="nav-link" onclick="location.href='friends.html'"><i data-lucide="users"></i> Друзья</button>
            <button class="nav-link" onclick="location.href='settings.html'"><i data-lucide="settings"></i> Настройки</button>
            <button class="nav-link" onclick="location.href='updates.html'"><i data-lucide="refresh-cw"></i> Что нового?</button>
            
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);">
                <button class="nav-link" onclick="logout()" style="color: #ff5e5e;"><i data-lucide="log-out"></i> Выход</button>
            </div>
        </div>

        <div class="drawer-footer">
            <div class="profile-card" onclick="location.href='profile.html'">
                <div class="p-avatar" id="footer-avatar">?</div>
                <div class="p-info">
                    <span class="p-realname" id="footer-name">Загрузка...</span>
                    <span class="p-username" id="footer-nick">@user</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="burger-btn" onclick="toggleMenu()">
                    <i data-lucide="menu"></i>
                </button>
                <div class="search-box">
                    <i data-lucide="search" size="16" style="opacity: 0.3;"></i>
                    <input type="text" placeholder="Поиск в Mewnly">
                </div>
            </div>
            
            <div style="padding: 20px; text-align: center; opacity: 0.3;">
                <i data-lucide="message-square" size="40"></i>
                <p style="font-size: 13px;">Чатов пока нет</p>
            </div>
        </aside>

        <main class="main-panel">
            <h1 class="welcome-title">Mewnly</h1>
            <div class="clock" id="clock">00:00:00</div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const userNick = localStorage.getItem('mewnly_user');

        if (!userNick) window.location.href = '../index.html';

        function toggleMenu() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('ru-RU');
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function logout() {
            if (confirm("Выйти?")) {
                await window.firebaseLogout();
                localStorage.clear();
                window.location.href = '../index.html';
            }
        }

        async function init() {
            const data = await window.loadFirebaseProfile(userNick);
            if (data) {
                // Имя и ник
                document.getElementById('footer-name').innerText = data.realName || "Без имени";
                document.getElementById('footer-nick').innerText = "@" + data.username;
                
                // Аватарка
                const avatarDiv = document.getElementById('footer-avatar');
                if (data.avatar) {
                    avatarDiv.innerHTML = `<img src="${data.avatar}" alt="pfp">`;
                } else {
                    avatarDiv.innerText = data.username[0].toUpperCase();
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
