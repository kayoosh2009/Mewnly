<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewnly — Secure Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-main: #313338;
            --bg-card: #2b2d31;
            --bg-input: #1e1f22;
            --blurple: #5865f2;
            --blurple-hover: #4752c4;
            --text-main: #f2f3f5;
            --text-muted: #b5bac1;
            --danger: #fa777a;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'gg sans', 'Noto Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .auth-card {
            background: var(--bg-card);
            padding: 32px;
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .header { text-align: center; margin-bottom: 20px; }
        h2 { margin: 0; font-size: 24px; font-weight: 600; }
        .subtitle { color: var(--text-muted); font-size: 16px; margin-top: 8px; }

        .input-group { margin-bottom: 20px; }
        label {
            display: block;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 10px;
            background: var(--bg-input);
            border: none;
            border-radius: 3px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
            transition: border 0.2s;
        }

        input:focus { outline: 1px solid var(--blurple); }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--blurple);
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--blurple-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .link { color: #00a8fc; text-decoration: none; font-size: 14px; cursor: pointer; }
        .link:hover { text-decoration: underline; }

        .seed-box {
            display: none;
            background: var(--bg-input);
            padding: 12px;
            border: 1px dashed var(--blurple);
            border-radius: 4px;
            color: var(--text-main);
            font-family: monospace;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: left;
        }

        .hidden { display: none; }
        .footer-text { margin-top: 12px; font-size: 14px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="header" id="header-area">
        <h2 id="main-title">Welcome back!</h2>
        <div class="subtitle" id="main-subtitle">We're so excited to see you again!</div>
    </div>

    <div id="auth-form">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password">
        </div>

        <div class="input-group hidden" id="confirm-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm-password">
        </div>

        <div id="seed-display" class="seed-box"></div>

        <button id="submit-btn" onclick="processAuth()">Log In</button>

        <div class="footer-text">
            <span id="toggle-text">Need an account?</span>
            <span class="link" onclick="toggleMode()" id="toggle-link">Register</span>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwEl9AGJFkwRRtLwzEkDkOGoqETshRmWr6OAF645Nbf2xRGER8_jBCqF4Z6ayi-Eok6/exec';
    let isLoginMode = true;

    // 1. ПРОВЕРКА АВТОВХОДА
    window.onload = () => {
        if (localStorage.getItem('mewnly_user')) {
            window.location.href = 'app/dash.html';
        }
    };

    // 2. ПЕРЕКЛЮЧЕНИЕ МЕЖДУ ВХОДОМ И РЕГИСТРАЦИЕЙ
    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('confirm-group').classList.toggle('hidden');
        document.getElementById('main-title').innerText = isLoginMode ? 'Welcome back!' : 'Create an account';
        document.getElementById('main-subtitle').style.display = isLoginMode ? 'block' : 'none';
        document.getElementById('submit-btn').innerText = isLoginMode ? 'Log In' : 'Continue';
        document.getElementById('toggle-text').innerText = isLoginMode ? 'Need an account?' : 'Already have an account?';
        document.getElementById('toggle-link').innerText = isLoginMode ? 'Register' : 'Log In';
        document.getElementById('seed-display').style.display = 'none';
    }

    // 3. ОСНОВНАЯ ЛОГИКА
    async function processAuth() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');

        if (!user || !pass) return alert("Please fill in all fields.");

        // Логика регистрации (подтверждение пароля и сид-фраза)
        if (!isLoginMode) {
            const confirm = document.getElementById('confirm-password').value;
            if (pass !== confirm) return alert("Passwords do not match.");

            const seedBox = document.getElementById('seed-display');
            if (seedBox.style.display !== 'block') {
                const words = ["echo", "neon", "pixel", "void", "cyber", "pulse", "drift", "sonic", "alpha", "omega", "flux", "starlight"];
                const seed = Array.from({length: 12}, () => words[Math.floor(Math.random()*words.length)]).join(" ");
                seedBox.innerText = "BACKUP SEED: " + seed;
                seedBox.style.display = 'block';
                btn.innerText = "I've saved it. Finish Registration";
                return;
            }
        }

        // Начинаем процесс отправки
        btn.innerText = "Verifying...";
        btn.disabled = true;

        // Получаем IP
        let ip = "0.0.0.0";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            ip = (await res.json()).ip;
        } catch(e) {}

        const passHash = CryptoJS.SHA256(pass).toString();
        const payload = {
            action: isLoginMode ? 'login' : 'register',
            username: user,
            password: passHash,
            seed: document.getElementById('seed-display').innerText || ""
        };

        try {
            // Отправляем запрос в Google Таблицы
            const response = await fetch(`${SCRIPT_URL}?ip=${ip}`, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            const result = await response.text();

            if (result === "SUCCESS_LOGIN" || result === "SUCCESS_REG") {
                // ПУСКАЕМ ТОЛЬКО ПРИ ПОДТВЕРЖДЕНИИ ОТ ТАБЛИЦЫ
                localStorage.setItem('mewnly_user', user);
                window.location.href = 'app/dash.html';
            } else if (result === "USER_EXISTS") {
                alert("This username is already taken!");
                resetBtn(btn);
            } else if (result === "INVALID_PASSWORD" || result === "USER_NOT_FOUND") {
                alert("Invalid username or password!");
                resetBtn(btn);
            } else {
                alert("Server error: " + result);
                resetBtn(btn);
            }

        } catch (err) {
            console.error(err);
            alert("Connection error or CORS blocked. Make sure your Google Script is deployed correctly.");
            resetBtn(btn);
        }
    }

    function resetBtn(btn) {
        btn.disabled = false;
        btn.innerText = isLoginMode ? "Log In" : "Continue";
    }
</script>

</body>
</html>
