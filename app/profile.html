<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mewnly — Настройка профиля</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3YsqmPng3BdsgbZXs-Ok1c5Z4e1HZhkY",
            authDomain: "mewnly.firebaseapp.com",
            projectId: "mewnly",
            storageBucket: "mewnly.firebasestorage.app",
            messagingSenderId: "854522459869",
            appId: "1:854522459869:web:edc0df5aad55ca1f4e8d34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Глобальные функции для работы с БД
        window.getUserProfile = async (nick) => {
            const q = query(collection(db, "users"), where("username", "==", nick.toLowerCase()));
            const snap = await getDocs(q);
            return !snap.empty ? { id: snap.docs[0].id, ...snap.docs[0].data() } : null;
        };

        window.updateUserProfile = async (docId, data) => {
            const userRef = doc(db, "users", docId);
            return await updateDoc(userRef, data);
        };
    </script>

    <style>
        :root {
            --bg-deep: #0f0f0f;
            --bg-card: #161616;
            --accent: #7F49B4;
            --accent-light: #9d6cd3;
            --text-gray: #a0a0a0;
            --white: #ffffff;
            --border: rgba(127, 73, 180, 0.15);
        }

        body {
            margin: 0; background: var(--bg-deep); color: var(--text-gray);
            font-family: 'Inter', sans-serif; display: flex;
            justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }

        .profile-container {
            background: var(--bg-card); width: 100%; max-width: 500px;
            border-radius: 32px; border: 1px solid var(--border);
            position: relative; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.7);
        }

        .profile-header-bg {
            height: 120px;
            background: linear-gradient(135deg, #1f142e 0%, #111 100%);
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            color: var(--white); padding: 10px; border-radius: 14px;
            cursor: pointer; backdrop-filter: blur(10px); z-index: 10; transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent); }

        .content { padding: 0 30px 40px; margin-top: -60px; text-align: center; }

        /* Аватар */
        .avatar-wrapper {
            position: relative; width: 130px; height: 130px; margin: 0 auto 15px;
            cursor: pointer;
        }
        .avatar-main {
            width: 100%; height: 100%; background: var(--accent);
            border-radius: 45px; display: flex; align-items: center; justify-content: center;
            font-size: 52px; color: white; font-weight: 800;
            border: 5px solid var(--bg-card); overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        .avatar-main img { width: 100%; height: 100%; object-fit: cover; }

        .edit-badge {
            position: absolute; bottom: 0; right: 0;
            background: var(--accent); width: 38px; height: 38px;
            border-radius: 14px; display: flex; align-items: center;
            justify-content: center; border: 4px solid var(--bg-card); color: white;
        }

        .user-meta { margin-bottom: 25px; }
        .u-nick-title { color: var(--white); font-size: 22px; font-weight: 800; margin: 0; }
        .u-id-badge {
            display: inline-block; padding: 4px 12px; background: rgba(127, 73, 180, 0.1);
            color: var(--accent); border-radius: 10px; font-size: 11px; font-weight: 800;
            text-transform: uppercase; margin-top: 8px;
        }

        /* Поля */
        .grid-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; margin-bottom: 20px; }
        .field-box { margin-bottom: 18px; text-align: left; }
        
        label { display: block; color: var(--accent); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; padding-left: 5px;}

        input, textarea {
            width: 100%; background: #0a0a0a; border: 1px solid var(--border);
            border-radius: 16px; padding: 14px; color: var(--white);
            font-size: 14px; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: var(--accent); background: #111; }

        textarea { height: 80px; resize: none; }

        .save-btn {
            width: 100%; padding: 18px; background: var(--accent);
            color: white; border: none; border-radius: 20px;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .save-btn:hover { background: var(--accent-light); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(127, 73, 180, 0.3); }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="profile-container">
        <button class="back-btn" onclick="location.href='dash.html'"><i data-lucide="chevron-left"></i></button>
        <div class="profile-header-bg"></div>
        
        <div class="content">
            <div class="avatar-wrapper" onclick="document.getElementById('fileInput').click()">
                <div class="avatar-main" id="avatarPreview">?</div>
                <div class="edit-badge"><i data-lucide="pencil" size="16"></i></div>
            </div>
            <input type="file" id="fileInput" accept="image/*" onchange="handleImage(this)">

            <div class="user-meta">
                <h2 class="u-nick-title" id="displayNick">@username</h2>
                <div class="u-id-badge">Stealth Account Verified</div>
            </div>

            <div class="grid-fields">
                <div class="field-item">
                    <label>Real Name</label>
                    <input type="text" id="nameInput" placeholder="John Doe">
                </div>
                <div class="field-item">
                    <label>Birthday</label>
                    <input type="date" id="dateInput">
                </div>
            </div>

            <div class="field-box">
                <label>Status / Mood</label>
                <input type="text" id="statusInput" placeholder="How's it going?" maxlength="50">
            </div>

            <div class="field-box">
                <label>About Me</label>
                <textarea id="aboutInput" placeholder="Tell the world about your digital soul..." maxlength="200"></textarea>
            </div>

            <button class="save-btn" id="saveBtn" onclick="saveData()">Update Cyber Profile</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const currentNick = localStorage.getItem('mewnly_user');
        let userDocId = null;
        let base64Avatar = null;

        async function loadProfile() {
            if (!currentNick) return window.location.href = '../index.html';
            
            const data = await window.getUserProfile(currentNick);
            if (data) {
                userDocId = data.id;
                document.getElementById('displayNick').innerText = "@" + data.username;
                document.getElementById('nameInput').value = data.realName || "";
                document.getElementById('dateInput').value = data.birthDate || "";
                document.getElementById('statusInput').value = data.status || "";
                document.getElementById('aboutInput').value = data.description || "";
                
                if (data.avatar) {
                    document.getElementById('avatarPreview').innerHTML = `<img src="${data.avatar}">`;
                    base64Avatar = data.avatar;
                } else {
                    document.getElementById('avatarPreview').innerText = data.username[0].toUpperCase();
                }
            }
        }

        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('avatarPreview').innerHTML = `<img src="${e.target.result}">`;
                    base64Avatar = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveData() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = "Syncing with Cloud...";

            const updatedData = {
                realName: document.getElementById('nameInput').value,
                birthDate: document.getElementById('dateInput').value,
                status: document.getElementById('statusInput').value,
                description: document.getElementById('aboutInput').value,
                avatar: base64Avatar
            };

            try {
                await window.updateUserProfile(userDocId, updatedData);
                alert("Profile Encrypted & Saved!");
                location.href = 'dash.html';
            } catch (e) {
                alert("Error: " + e.message);
                btn.disabled = false;
                btn.innerText = "Update Cyber Profile";
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
